[constraints]
max_cycles = 0 # zero tolerance for circular dependencies
max_coupling = "B" # maximum coupling grade
max_cc = 300 # raised to avoid noise from legacy complex functions; focus is on layer architecture

# ─────────────────────────────────────────────
# Layer ordering
# ─────────────────────────────────────────────
# sentrux layer_direction rule (observed behavior in v0.5.7):
#   source layer order must be <= target layer order.
# Therefore, order increases from the topmost application layer down to the bottommost infrastructure layer.
# ─────────────────────────────────────────────

[[layers]]
name = "apps"
paths = ["apps/**/*"]
order = 0

[[layers]]
name = "plugins"
paths = ["plugins/**/*"]
order = 1

[[layers]]
name = "kit"
paths = ["packages/kit/**/*"]
order = 2

[[layers]]
name = "core"
paths = ["packages/core/**/*"]
order = 3

[[layers]]
name = "shared"
paths = ["packages/shared/**/*"]
order = 4

[[layers]]
name = "jsx"
paths = ["packages/jsx/**/*"]
order = 5

[[layers]]
name = "var"
paths = ["packages/var/**/*"]
order = 6

[[layers]]
name = "ast"
paths = ["packages/ast/**/*"]
order = 7

[[layers]]
name = "infra"
paths = ["packages/eslint/**/*"]
order = 8

[[layers]]
name = "local"
paths = [".pkgs/**/*"]
order = 9

# Prevent plugins from reverse-depending on applications.
# (Layer ordering already blocks this; the boundary makes it explicit.)
[[boundaries]]
from = "plugins/**/*"
to = "apps/**/*"
reason = "Plugins must not depend on applications"
