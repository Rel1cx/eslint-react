[constraints]
max_cycles = 0 # zero tolerance for circular dependencies
max_coupling = "B" # maximum coupling grade
max_cc = 50 # raised to avoid noise from legacy complex functions; focus is on layer architecture
max_god_file_count = 2

# ─────────────────────────────────────────────
# Layer ordering
# ─────────────────────────────────────────────
# sentrux layer_direction rule (observed behavior in v0.5.7):
#   source layer order must be <= target layer order.
# Therefore, order increases from the topmost application layer down to the bottommost infrastructure layer.
# ─────────────────────────────────────────────

[[layers]]
name = "apps"
paths = ["apps/**/*"]
order = 0

[[layers]]
name = "plugins"
paths = ["plugins/**/*"]
order = 1

[[layers]]
name = "kit"
paths = ["packages/kit/**/*"]
order = 2

[[layers]]
name = "core"
paths = ["packages/core/**/*"]
order = 3

[[layers]]
name = "shared"
paths = ["packages/shared/**/*"]
order = 4

[[layers]]
name = "jsx"
paths = ["packages/jsx/**/*"]
order = 5

[[layers]]
name = "var"
paths = ["packages/var/**/*"]
order = 6

[[layers]]
name = "ast"
paths = ["packages/ast/**/*"]
order = 7

[[layers]]
name = "infra"
paths = ["packages/eslint/**/*"]
order = 8

[[layers]]
name = "local"
paths = [".pkgs/**/*"]
order = 9

# Prevent plugins from reverse-depending on applications.
# (Layer ordering already blocks this; the boundary makes it explicit.)
[[boundaries]]
from = "plugins/**/*"
to = "apps/**/*"
reason = "Plugins must not depend on applications"

# Applications must not depend on each other
[[boundaries]]
from = "apps/website/**/*"
to = "apps/playground/**/*"
reason = "Applications must remain independent"

[[boundaries]]
from = "apps/playground/**/*"
to = "apps/website/**/*"
reason = "Applications must remain independent"

# Individual ESLint plugins must not depend on each other
[[boundaries]]
from = "plugins/eslint-plugin-react-*/**/*"
to = "plugins/eslint-plugin-react-*/**/*"
reason = "Plugins must remain independent; use the aggregating plugin for composition"

# Plugins must not depend on kit directly; use core and lower-level packages instead
[[boundaries]]
from = "plugins/**/*"
to = "packages/kit/**/*"
reason = "Plugins must not depend on kit; use core, ast, jsx, var, or shared instead"

# Infra layer must not depend on other workspace packages to stay a pure foundation
[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/ast/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/core/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/jsx/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/kit/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/shared/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

[[boundaries]]
from = "packages/eslint/**/*"
to = "packages/var/**/*"
reason = "Infra layer must remain pure and not depend on other workspace packages"

# AST is a foundational layer and must not depend on higher-level packages
[[boundaries]]
from = "packages/ast/**/*"
to = "packages/core/**/*"
reason = "AST is a foundational layer and must not depend on higher-level packages"

[[boundaries]]
from = "packages/ast/**/*"
to = "packages/jsx/**/*"
reason = "AST is a foundational layer and must not depend on higher-level packages"

[[boundaries]]
from = "packages/ast/**/*"
to = "packages/kit/**/*"
reason = "AST is a foundational layer and must not depend on higher-level packages"

[[boundaries]]
from = "packages/ast/**/*"
to = "packages/shared/**/*"
reason = "AST is a foundational layer and must not depend on higher-level packages"

[[boundaries]]
from = "packages/ast/**/*"
to = "packages/var/**/*"
reason = "AST is a foundational layer and must not depend on higher-level packages"
