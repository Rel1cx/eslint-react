<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutiger Aero ESLint React Icon</title>
    <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #a8edea 0%, #7ee8fa 30%, #80d0c7 70%, #5ee7df 100%);
      overflow: hidden;
    }
    .icon-container {
      width: 512px;
      height: 512px;
      filter: drop-shadow(0 20px 40px rgba(0, 120, 150, 0.3));
    }
    </style>
  </head>
  <body>
    <div class="icon-container">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Background glow -->
          <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
            <stop offset="50%" stop-color="rgba(180,240,255,0.3)" />
            <stop offset="100%" stop-color="rgba(100,220,240,0)" />
          </radialGradient>

          <!-- Hexagon body gradient -->
          <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff" />
            <stop offset="40%" stop-color="#00a8cc" />
            <stop offset="70%" stop-color="#008ba3" />
            <stop offset="100%" stop-color="#005f73" />
          </linearGradient>

          <!-- Hexagon highlight -->
          <linearGradient id="hexHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.85)" />
            <stop offset="30%" stop-color="rgba(255,255,255,0.2)" />
            <stop offset="60%" stop-color="rgba(255,255,255,0)" />
            <stop offset="100%" stop-color="rgba(0,150,180,0.1)" />
          </linearGradient>

          <!-- Hexagon inner glass texture -->
          <linearGradient id="hexInner" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.5)" />
            <stop offset="40%" stop-color="rgba(180,240,255,0.2)" />
            <stop offset="100%" stop-color="rgba(0,150,180,0.15)" />
          </linearGradient>

          <!-- Core sphere gradient -->
          <radialGradient id="coreGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="20%" stop-color="#b8f4ff" />
            <stop offset="50%" stop-color="#00d4ff" />
            <stop offset="85%" stop-color="#0077b6" />
            <stop offset="100%" stop-color="#004f6e" />
          </radialGradient>

          <!-- Core sphere bottom reflection -->
          <radialGradient id="coreReflect" cx="50%" cy="85%" r="50%">
            <stop offset="0%" stop-color="rgba(0,180,220,0.4)" />
            <stop offset="100%" stop-color="rgba(0,120,160,0)" />
          </radialGradient>

          <!-- Strong highlight -->
          <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.95)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </linearGradient>

          <!-- Shadow filter -->
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#004f6e" flood-opacity="0.25" />
          </filter>

          <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>

          <!-- React elliptical orbit gradient -->
          <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4a9eff" />
            <stop offset="50%" stop-color="#00a8cc" />
            <stop offset="100%" stop-color="#005f73" />
          </linearGradient>

          <linearGradient id="orbitHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.75)" />
            <stop offset="40%" stop-color="rgba(255,255,255,0.1)" />
            <stop offset="100%" stop-color="rgba(0,150,180,0)" />
          </linearGradient>
        </defs>

        <!-- Background glow -->
        <circle cx="256" cy="256" r="220" fill="url(#bgGlow)" />

        <!-- Outer ambient light -->
        <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />

        <!-- Three elliptical orbits in React style -->
        <g filter="url(#softShadow)">
          <!-- Orbit 1 -->
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitGrad)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitHighlight)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <path
            d="M 101 256 A 155 58 0 0 1 155 211"
            fill="none"
            stroke="rgba(255,255,255,0.5)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </g>
        <g transform="rotate(60 256 256)" filter="url(#softShadow)">
          <!-- Orbit 2 -->
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitGrad)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitHighlight)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <path
            d="M 101 256 A 155 58 0 0 1 155 211"
            fill="none"
            stroke="rgba(255,255,255,0.5)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </g>
        <g transform="rotate(120 256 256)" filter="url(#softShadow)">
          <!-- Orbit 3 -->
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitGrad)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <ellipse
            cx="256"
            cy="256"
            rx="155"
            ry="58"
            fill="none"
            stroke="url(#orbitHighlight)"
            stroke-width="10"
            stroke-linecap="round"
          />
          <path
            d="M 101 256 A 155 58 0 0 1 155 211"
            fill="none"
            stroke="rgba(255,255,255,0.5)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </g>

        <!-- ESLint hexagon body -->
        <g filter="url(#softShadow)">
          <!-- Hexagon outer frame -->
          <polygon
            points="256,106 386,181 386,331 256,406 126,331 126,181"
            fill="none"
            stroke="url(#hexGrad)"
            stroke-width="14"
            stroke-linejoin="round"
          />
          <polygon
            points="256,106 386,181 386,331 256,406 126,331 126,181"
            fill="none"
            stroke="url(#hexHighlight)"
            stroke-width="14"
            stroke-linejoin="round"
          />

          <!-- Hexagon inner glass fill -->
          <polygon points="256,119 374,187 374,325 256,393 138,325 138,187" fill="url(#hexInner)" />
        </g>

        <!-- Hexagon top-edge highlight -->
        <!--<path
          d="M 256 106 L 386 181"
          fill="none"
          stroke="rgba(255,255,255,0.7)"
          stroke-width="2"
          stroke-linecap="round"
        />-->
        <!--<path
          d="M 256 106 L 126 181"
          fill="none"
          stroke="rgba(255,255,255,0.5)"
          stroke-width="2"
          stroke-linecap="round"
        />-->

        <!-- Core sphere (React style) -->
        <g filter="url(#softShadow)">
          <circle cx="256" cy="256" r="42" fill="url(#coreGrad)" />
          <!-- Bottom ambient reflection -->
          <circle cx="256" cy="256" r="42" fill="url(#coreReflect)" />
          <!-- Strong highlight -->
          <ellipse cx="240" cy="240" rx="16" ry="12" fill="url(#glossGrad)" transform="rotate(-30 240 240)" />
          <!-- Small highlight spot -->
          <ellipse cx="245" cy="245" rx="6" ry="4" fill="white" opacity="0.95" transform="rotate(-30 245 245)" />
        </g>

        <!-- Highlight emphasis at orbit intersections -->
        <circle cx="256" cy="198" r="3.5" fill="white" opacity="0.6" />
        <circle cx="256" cy="314" r="3.5" fill="white" opacity="0.35" />

        <!-- Hexagon corner highlights -->
        <!--<circle cx="256" cy="106" r="3" fill="white" opacity="0.8"/>-->
        <!--<circle cx="386" cy="181" r="2.5" fill="white" opacity="0.5"/>-->
        <!--<circle cx="126" cy="181" r="2.5" fill="white" opacity="0.5"/>-->
      </svg>
    </div>
  </body>
</html>
