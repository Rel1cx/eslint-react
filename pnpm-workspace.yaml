packages:
  - .pkgs/*
  - apps/*
  - packages/*
  - plugins/*
  - examples/*

allowBuilds:
  "@nubjs/nub": true
  "@parcel/watcher": true
  dprint: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  sharp: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
  - sharp

