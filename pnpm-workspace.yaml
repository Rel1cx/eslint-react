packages:
  - .pkgs/*
  - apps/*
  - packages/*
  - plugins/*
  - examples/*

allowBuilds:
  "@parcel/watcher": true
  dprint: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  sharp: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
  - sharp

overrides:
  "@types/react": "^19.2.17"
  "@types/react-dom": "^19.2.3"
  "@typescript-eslint/eslint-plugin": "^8.62.0"
  "@typescript-eslint/parser": "^8.62.0"
  "@typescript-eslint/project-service": "^8.62.0"
  "@typescript-eslint/rule-schema-to-typescript-types": "^8.62.0"
  "@typescript-eslint/rule-tester": "^8.62.0"
  "@typescript-eslint/scope-manager": "^8.62.0"
  "@typescript-eslint/tsconfig-utils": "^8.62.0"
  "@typescript-eslint/type-utils": "^8.62.0"
  "@typescript-eslint/types": "^8.62.0"
  "@typescript-eslint/typescript-estree": "^8.62.0"
  "@typescript-eslint/utils": "^8.62.0"
  "@typescript-eslint/visitor-keys": "^8.62.0"
  axios: "^1.18.1" # Transitive dependency axios 1.15.0 is introduced via nx 22.7.1
  chokidar: "^5.0.0"
  defu: "^6.1.7"
  dompurify: "^3.4.11"
  esbuild: "^0.28.1"
  follow-redirects: "^1.16.0"
  form-data: "^4.0.6"
  js-yaml: "^4.2.0"
  lodash-es: "^4.18.1"
  lodash: "^4.18.1"
  mermaid: "^11.15.0"
  minimatch: "^10.2.5"
  next: "^16.2.9"
  path-to-regexp: "^8.4.2"
  postcss: "^8.5.15"
  react-dom: "^19.2.7"
  react: "^19.2.7"
  semver: "^7.8.5"
  tmp: "^0.2.7"
  ts-api-utils: "^2.5.0"
  tslib: "^2.8.1"
  typescript-eslint: "^8.62.0"
  typescript: "6.0.3"
  undici-types: "^8.5.0"
  undici: "^8.5.0"
  uuid: "^14.0.1"

trustPolicy: "no-downgrade"
minimumReleaseAge: 1440 # 1 day
minimumReleaseAgeExclude:
  - tsl-dx@0.13.1
