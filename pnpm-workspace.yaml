packages:
  - .pkgs/*
  - apps/*
  - packages/*
  - packages/*/*
  - examples/*

onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
  - sharp

overrides:
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@typescript-eslint/scope-manager": "^8.58.0"
  "@typescript-eslint/type-utils": "^8.58.0"
  "@typescript-eslint/types": "^8.58.0"
  "@typescript-eslint/utils": "^8.58.0"
  path-to-regexp: "^8.4.1"
  chokidar: ^5.0.0
  dompurify: ^3.3.3
  esbuild: ^0.27.4
  lodash: ^4.18.0
  minimatch: ^10.2.5
  next: ^16.2.2
  react-dom: ^19.2.4
  react: ^19.2.4
  semver: "^7.7.4"
  ts-api-utils: ^2.5.0
  tslib: ^2.8.1
  typescript-eslint: "^8.58.0"
  undici-types: ^7.24.6
  undici: ^7.24.6

trustPolicy: "no-downgrade"
