  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
  - sharp

overrides:
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@typescript-eslint/scope-manager": "^8.57.0"
  "@typescript-eslint/type-utils": "^8.57.0"
  "@typescript-eslint/types": "^8.57.0"
  "@typescript-eslint/utils": "^8.57.0"
  dompurify: ^3.3.3
  esbuild: ^0.27.4
  lodash: ^4.17.23
  minimatch: ^10.2.4
  next: ^16.1.6
  react-dom: ^19.2.4
  react: ^19.2.4
  semver: "^7.7.4"
  ts-api-utils: ^2.4.0
  tslib: ^2.8.1
  typescript-eslint: "^8.57.0"
  typescript: ^5.9.3
  undici-types: ^7.24.2
  undici: ^7.24.2

trustPolicy: "no-downgrade"
