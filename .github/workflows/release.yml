name: Release
on:
  push:
    tags:
      - "*"
jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup node@26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          package-manager-cache: false

      - name: Setup nub
        # zizmor: ignore[adhoc-packages] installs the nub toolchain per upstream docs; no lockfile applies to a global tool
        run: npm install --global --ignore-scripts=false @nubjs/nub

      - name: Install dependencies
        run: nub install --frozen-lockfile --ignore-scripts

      - name: Build
        run: nub run build

      - name: Determine release info
        id: release
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '^release: [0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION=$(echo "$COMMIT_MSG" | sed -E 's/^release: //')
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qE '^release: [0-9]+\.[0-9]+\.[0-9]+-(rc|beta|next)\.[0-9]+$'; then
            VERSION=$(echo "$COMMIT_MSG" | sed -E 's/^release: //')
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.release.outputs.is_release == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          {
            echo "## What's Changed"
            echo ""
            awk -v tag="$TAG" '
              BEGIN { found=0 }
              /^## / {
                if (found) { exit }
                if ($0 ~ "^## " tag " ") { found=1; next }
              }
              found { print }
            ' CHANGELOG.md
          } > release_notes.md

      - name: Pack packages
        if: steps.release.outputs.is_release == 'true'
        run: |
          for dir in packages/*/ plugins/*/; do
            (cd "$dir" && nub pack)
          done

      - name: Attest packages
        if: steps.release.outputs.is_release == 'true'
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            packages/*/*.tgz
            plugins/*/*.tgz

      - name: Create GitHub Release
        if: steps.release.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          VERSION: ${{ steps.release.outputs.version }}
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          TITLE="v$VERSION ($DATE)"
          {
            cat release_notes.md
            echo ""
            echo "## Attestation"
            echo ""
            echo "https://github.com/$REPO/attestations/$ATTESTATION_ID"
          } > final_release_notes.md
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file final_release_notes.md \
            $PRERELEASE_FLAG \
            packages/*/*.tgz plugins/*/*.tgz
