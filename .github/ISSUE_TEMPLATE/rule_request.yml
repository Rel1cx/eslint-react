name: 💬 Rule Request
title: "[rule] "
description: Suggest a rule
labels: ["rule request"]

body:
  - type: markdown
    attributes:
      value: |
        ## Rule Request

        Before submitting, ensure the request meets the rule-writing standards.

        ## References on Rule Design
        - [What makes a good rule](https://package.elm-lang.org/packages/jfmengels/elm-review/latest/Review-Rule#what-makes-a-good-rule)
        - [When to write or enable a rule](https://package.elm-lang.org/packages/jfmengels/elm-review/latest#when-to-write-or-enable-a-rule)

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe what problem this rule will solve. Provide specific code examples to illustrate the issue.
      placeholder: "This rule will solve..."
    validations:
      required: true

  - type: textarea
    id: alternative-solutions
    attributes:
      label: Alternative Solutions
      description: Describe attempts to solve the problem by changing the API or introducing a new API. Explain why these methods are insufficient to solve the problem.
      placeholder: "I've tried..."
    validations:
      required: true

  - type: textarea
    id: rule-docs-template
    attributes:
      label: Rule Documentation Template
      description: |
        Provide the rule documentation following the standard template structure used in this repository.
        This helps reviewers understand the rule's purpose, behavior, and edge cases.
      placeholder: |
        ## Rule Details

        <!-- Describe what problem this rule solves and why it's important. -->
        <!-- Explain the React concept or pattern that this rule enforces. -->

        ## Examples

        ### TODO: Add scenario title

        <!-- Describe the situation/context where the problematic pattern occurs -->

        ```tsx
        // Problem: Explain why this pattern is problematic
        ```

        ### TODO: Add scenario title

        <!-- Describe the recommended approach for this situation -->

        ```tsx
        // Recommended: Explain the correct pattern
        ```

        ### TODO: Add scenario title (optional)

        <!-- Describe cases where the pattern is acceptable -->

        ```tsx
        // OK: Explain when this pattern is fine
        ```

        ## Troubleshooting

        <!-- Optional: Address common questions or edge cases -->

        ### Why is this pattern problematic?

        ### What are the alternatives?

        ## Resources

        - [Rule Source](https://github.com/Rel1cx/eslint-react/tree/main/packages/plugins/...)
        <!-- Link to where the rule implementation would live -->

        ## Further Reading

        - [React Docs: ...](https://react.dev/...)
        <!-- Links to relevant React documentation -->
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Evaluation Checklist
      description: Check the following items to ensure the rule suggestion is reasonable.
      options:
        - label: Problems have been encountered with the pattern to be forbidden
          required: true
        - label: No solution was found by changing the API of the problematic code or introducing a new API
          required: true
        - label: Corner cases and acceptable patterns that would be forbidden have been considered
          required: true
        - label: The rule explains how to solve the issue clearly enough for beginners
          required: true
        - label: This rule has been discussed with team members and found valuable
          required: false
