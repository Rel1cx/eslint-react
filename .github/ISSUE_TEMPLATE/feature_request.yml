name: 💡 Feature Request
title: "[feat] "
description: Suggest an idea
labels: ["feature request"]

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        > [!NOTE]
        > Feature Request can be used to suggest a new rule, but compared to [Rule Request](https://github.com/Rel1cx/eslint-react/issues/new?template=rule_request.yml), it takes longer to evaluate and has a lower implementation priority.

        Before submitting, ensure the request meets the contribution guidelines.
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe the problem this feature will solve. Provide specific examples to illustrate the issue.
      placeholder: "This feature will solve..."
    validations:
      required: true

  - type: textarea
    id: alternative-solutions
    attributes:
      label: Alternative Solutions
      description: Describe attempts to solve the problem by other means. Explain why these methods are insufficient to solve the problem.
      placeholder: "I've tried..."
    validations:
      required: true

  - type: textarea
    id: feature-details
    attributes:
      label: Feature Details
      description: Suggest a name for the feature, as well as details about how it works and any relevant use cases.
      placeholder: |
        Feature name: [FeatureName]

        Details: Provide more background information and suggested implementation details.
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide examples of how this feature would be used in practice.
      placeholder: |
        Example usage:
        ```tsx
        // Example code demonstrating the feature
        ```
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Evaluation Checklist
      description: Check the following items to ensure the feature suggestion is reasonable.
      options:
        - label: Problems that this feature would solve have been encountered
          required: true
        - label: No solution was found with existing features or workarounds
          required: true
        - label: Potential edge cases and downsides have been considered and found acceptable
          required: true
        - label: The feature is well-defined and would provide clear value to users
          required: true
