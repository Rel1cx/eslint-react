<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600">
  <defs>
    <clipPath id="c1"><circle cx="150" cy="118" r="30" /></clipPath>
    <clipPath id="c2"><circle cx="300" cy="118" r="30" /></clipPath>
    <clipPath id="c3"><circle cx="450" cy="118" r="30" /></clipPath>
  </defs>
  <style>.bg      { fill: #0d1117; }
    .title   { fill: #f0f6fc; }
    .sub     { fill: #7d8590; }
    .divider { stroke: #21262d; }
    .name    { fill: #c9d1d9; }
    @media (prefers-color-scheme: light) {
      .bg      { fill: #ffffff; }
      .title   { fill: #1f2328; }
      .sub     { fill: #636e7b; }
      .divider { stroke: #d0d7de; }
      .name    { fill: #24292f; }
    }</style>
  <rect width="600" height="200" rx="12" class="bg" />
  <rect x="0" y="0" width="600" height="3" rx="2" fill="url(#gAccent)" />
  <text
    x="300"
    y="36"
    text-anchor="middle"
    dominant-baseline="middle"
    class="title"
    font-size="18"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
  >Sponsors &amp; Supporters</text>
  <text
    x="300"
    y="56"
    text-anchor="middle"
    dominant-baseline="middle"
    class="sub"
    font-size="11"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  >Thank you for making this project possible</text>
  <line x1="40" y1="70" x2="560" y2="70" class="divider" stroke-width="1" />
  <image
    href="https://avatars.githubusercontent.com/u/8657779?v=4"
    x="120"
    y="88"
    width="60"
    height="60"
    clip-path="url(#c1)"
    preserveAspectRatio="xMidYMid slice"
  />
  <text
    x="150"
    y="160"
    text-anchor="middle"
    dominant-baseline="middle"
    class="name"
    font-size="12"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  >Ulrich Stark</text>
  <image
    href="https://ko-fi.com/img/anon2.png?v=10"
    x="270"
    y="88"
    width="60"
    height="60"
    clip-path="url(#c2)"
    preserveAspectRatio="xMidYMid slice"
  />
  <text
    x="300"
    y="160"
    text-anchor="middle"
    dominant-baseline="middle"
    class="name"
    font-size="12"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  >Luke</text>
  <image
    href="https://avatars.githubusercontent.com/u/30024051?v=4"
    x="420"
    y="88"
    width="60"
    height="60"
    clip-path="url(#c3)"
    preserveAspectRatio="xMidYMid slice"
  />
  <text
    x="450"
    y="160"
    text-anchor="middle"
    dominant-baseline="middle"
    class="name"
    font-size="12"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  >Asuka Minato</text>
</svg>
